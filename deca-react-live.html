<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect,useCallback} = React;

const SCRT = "https://givery--scpartial.sandbox.my.salesforce-scrt.com";
const ORG  = "00Dfc000000hLIv";
const ES   = "DECA_AI_API";
const uuid = () => (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}));

async function getToken(){
  const r = await fetch(SCRT+"/iamessage/api/v2/authorization/unauthenticated/access-token",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({orgId:ORG,esDeveloperName:ES,capabilitiesVersion:"1",platform:"Web"})});
  if(!r.ok) throw new Error("token "+r.status+" "+await r.text());
  return (await r.json()).accessToken;
}
async function createConversation(token,convId){
  const r = await fetch(SCRT+"/iamessage/api/v2/conversation",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({conversationId:convId,esDeveloperName:ES})});
  if(!r.ok && r.status!==201) throw new Error("conv "+r.status+" "+await r.text());
}
async function sendTextApi(token,convId,text){
  await fetch(SCRT+"/iamessage/api/v2/conversation/"+convId+"/message",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({message:{id:uuid(),messageType:"StaticContentMessage",
      staticContent:{formatType:"Text",text:text}},esDeveloperName:ES,isNewMessagingSession:false})});
}

// ===== Web検索のスタブ（検索バックエンドは差し替え可。LIBERO FAQ で代用） =====
// LIBERO_問い合わせ集計_ナレッジ（実問い合わせ内容）に基づくFAQ（顧客名等のPIIは一般化）

// 記事タイトル →「〜が分からない」調のお困りごと表現に変換
function toTrouble(title){
  let t=String(title||"").replace(/^【[^】]*】/,"").trim().replace(/[。\s]+$/,"");
  if(!t) return "";
  t=t.replace(/(について|とは)$/,"");
  // 「〜がしたい/〜したい」→「〜のやり方がわからない」
  let m=t.match(/^(.*?)(?:が|を)?(?:し|やり)たい$/);
  if(m && m[1]) return m[1].replace(/[をが]$/,"")+"のやり方がわからない";
  // 説明系（違い・特徴・注意点・料金など）→「〜について知りたい」
  if(/(違い|特徴|注意点|まとめ|一覧|概要|仕様|率|料金|機能|とは|について)$/.test(t)) return t+"について知りたい";
  // 動詞で終わる手順系 →「〜方法がわからない」
  if(/(る|す|う|く|つ|ぶ|む|ぐ)$/.test(t)) return t+"方法がわからない";
  return t+"について知りたい";
}

// 回答テキストをFAQ記事（タイトル/本文/手順/出典）にパース
function parseArticle(raw){
  let web=false, text=String(raw||"");
  if(/^🔎\s*Web検索結果です/.test(text)){ web=true; text=text.replace(/^🔎\s*Web検索結果です\s*/,"").trim(); }
  let title="", source="";
  const mt = text.match(/【(.+?)】/); if(mt){ title=mt[1]; text=text.replace(mt[0],"").trim(); }
  const steps=[], intro=[];
  text.split(/\n/).map(s=>s.trim()).filter(Boolean).forEach(l=>{
    const sm = l.match(/^\d+[\.\)]\s*(.+)/);
    const src = l.match(/https?:\/\/[^\s]+/);
    if(sm){ steps.push(sm[1]); }
    else if(src){ source=src[0]; }
    else { intro.push(l); }
  });
  if(!title){ title = intro.length ? intro[0].replace(/[。:：].*$/,"").slice(0,42) : (steps.length?"ご案内":"回答"); if(intro.length) intro.shift(); }
  return {web, title, intro:intro.join("\n"), steps, source};
}

// 簡易マークダウン（**太字** / リンク / 見出し / 箇条書き / 番号付き / 段落）
function mdInline(s){
  const parts=[]; let rest=String(s); let key=0;
  const re=/(\*\*([^*]+)\*\*)|(https?:\/\/[^\s）)]+)/;
  for(;;){ const m=rest.match(re); if(!m){ parts.push(rest.replace(/[*_`]/g,"")); break; }
    if(m.index>0) parts.push(rest.slice(0,m.index).replace(/[*_`]/g,""));
    if(m[2]!==undefined) parts.push(React.createElement('strong',{key:key++},m[2]));
    else parts.push(React.createElement('a',{key:key++,href:m[3],target:'_blank',rel:'noopener'},m[3]));
    rest=rest.slice(m.index+m[0].length);
  }
  return parts;
}
function Markdown({text}){
  const lines=String(text||"").split(/\n/); const out=[]; let i=0;
  const isList=t=>/^[\*\-・･]\s?/.test(t), isNum=t=>/^\d+[\.\)]\s/.test(t), isH=t=>/^#{1,4}\s/.test(t);
  const isNote=t=>/^(※|＊|注[:：]|＞|>)/.test(t);
  const isImg=t=>/^!\[[^\]]*\]\(https?:\/\//.test(t);
  while(i<lines.length){
    const t=lines[i].trim();
    if(!t){ i++; continue; }
    if(/^#{1,4}[ \t　]*$/.test(t)){ i++; continue; }   // 記号だけの空見出し(###)は描画しない
    if(isImg(t)){ const im=t.match(/\((https?:\/\/[^)\s]+)\)/); if(im){ out.push(React.createElement('img',{key:i,src:im[1],alt:'',className:'mdimg',loading:'lazy'})); } i++; continue; }
    if(isH(t)){ const lvl=Math.min(4,(t.match(/^#+/)||["#"])[0].length); out.push(React.createElement(lvl<=2?"h3":(lvl===3?"h4":"h5"),{key:i,className:"mdh mdh"+lvl},mdInline(t.replace(/^#{1,4}\s/,'')))); i++; continue; }
    if(isNum(t)){ const it=[];
      // 手順の途中に挟まる画像は直前のステップ内に取り込む（リスト分断＝番号リセットを防ぐ）
      while(i<lines.length){
        const u=lines[i].trim();
        if(isNum(u)){ it.push({t:u.replace(/^\d+[\.\)]\s/,''),imgs:[]}); i++; continue; }
        if(!u){ let k=i; while(k<lines.length&&!lines[k].trim())k++; if(k<lines.length&&isImg(lines[k].trim())&&it.length){ i=k; continue; } break; }
        if(isImg(u)&&it.length){ const im=u.match(/\((https?:\/\/[^)\s]+)\)/); if(im) it[it.length-1].imgs.push(im[1]); i++;
          let k=i; while(k<lines.length&&!lines[k].trim())k++; if(k<lines.length&&(isNum(lines[k].trim())||isImg(lines[k].trim()))) i=k;
          continue; }
        break;
      }
      const mkLi=(x,k)=>React.createElement('li',{key:k},mdInline(x.t).concat(x.imgs.map((u2,q)=>React.createElement('img',{key:'im'+q,src:u2,alt:'',className:'mdimg',loading:'lazy'}))));
      if(it.length>=2) out.push(React.createElement('ol',{key:i},it.map(mkLi)));
      else out.push(React.createElement('ul',{key:i,className:'mdul'},it.map(mkLi)));  // 単独の番号は●に
      continue; }
    if(isList(t)){ const it=[]; while(i<lines.length&&isList(lines[i].trim())){ it.push(lines[i].trim().replace(/^[\*\-・･]\s?/,'')); i++; }
      out.push(React.createElement('ul',{key:i,className:'mdul'},it.map((x,k)=>React.createElement('li',{key:k},mdInline(x))))); continue; }
    if(isNote(t)){ const it=[]; while(i<lines.length&&isNote(lines[i].trim())){ it.push(lines[i].trim().replace(/^[＞>]\s*/,'')); i++; }
      out.push(React.createElement('div',{key:i,className:'mdnote'},it.map((x,k)=>React.createElement('div',{key:k},mdInline(x))))); continue; }
    const para=[]; while(i<lines.length){ const u=lines[i].trim(); if(!u||isH(u)||isNum(u)||isList(u)||isImg(u)||isNote(u)) break; para.push(u); i++; }
    out.push(React.createElement('p',{key:i,className:'mdp'},mdInline(para.join(' '))));
  }
  return React.createElement('div',null,out);
}

// 公式ヘルプ記事（articles.js = window.__DECA_ARTICLES）からのキーワード検索
const KEYWORDS=["シナリオ","配信","予約","予約配信","セグメント","オーディエンス","配信対象","リッチメニュー","メニュー","ログイン","ユーザー","権限","アカウント","招待","エラー","不具合","レポート","分析","友だち","ラベル","ステップ","ステップ配信","有人チャット","チャット","流入","経路","カスタム","メッセージ","設定","プラン","料金","契約","連携","CSV","API","コンバージョン","一問一答","会員証","差し込み","クリック","開封","アンケート"];
function searchArticles(query){
  const arts=(typeof window!=="undefined" && window.__DECA_ARTICLES) || [];
  if(!arts.length) return null;
  const q=String(query||"");
  const terms=KEYWORDS.filter(k=>q.indexOf(k)>=0);
  let best=null,sc=0;
  arts.forEach(a=>{
    let s=0;
    terms.forEach(t=>{ if((a.title||"").indexOf(t)>=0) s+=3; if((a.body||"").indexOf(t)>=0) s+=1; });
    if(a.title && q.length>=4 && q.indexOf(a.title)>=0) s+=6;
    if(s>sc){sc=s;best=a;}
  });
  return sc>=3 ? best : null;
}
// 上位N件の関連記事（参考リンク用）
function searchArticlesTop(query,n){
  const arts=(typeof window!=="undefined" && window.__DECA_ARTICLES) || [];
  const q=String(query||""); const terms=KEYWORDS.filter(k=>q.indexOf(k)>=0);
  const scored=arts.map(a=>{ let s=0; terms.forEach(t=>{ if((a.title||"").indexOf(t)>=0)s+=3; if((a.body||"").indexOf(t)>=0)s+=1; }); if(a.title&&q.length>=4&&q.indexOf(a.title)>=0)s+=6; return {a:a,s:s}; });
  return scored.filter(x=>x.s>=2).sort((x,y)=>y.s-x.s).slice(0,n).map(x=>x.a);
}

// 記事本文を読みやすく整形（中黒を箇条書き行に・注意書き分離・区切り線除去・長文を文単位に）
function cleanBody(s){
  let t=String(s||"");
  t=t.replace(/[\-—─ー]{4,}/g,"\n");                  // 区切り線を除去
  t=t.replace(/【([^】]+)】/g,"\n\n## $1\n");          // 【見出し】→ 小見出し
  t=t.replace(/(^|\n)\s*目次\s*(?=\n)/g,"\n");          // 目次ラベル除去
  t=t.replace(/\s*[･・]\s*/g,"\n- ");                  // 中黒 → 箇条書き
  t=t.replace(/\s*※\s*/g,"\n\n※ ");                    // 注意書きを段落に
  t=t.replace(/([。！？])\s*(?=\S)/g,"$1\n");           // 文末で改行
  t=t.replace(/[ \t　]{2,}/g," ");
  t=t.replace(/\n{3,}/g,"\n\n").replace(/^\s+/,"").trim();
  return t;
}

// LLMが1行に詰め込んだ ##見出し / 1. 手順 / - 箇条書き を行頭へ分解（Markdownを正しく描画させる）
function normalizeMd(t){
  let s=String(t||"").replace(/\r/g,"");
  s=s.replace(/＃/g,"#");                                                        // 全角＃→半角
  s=s.replace(/([。！？」』）)])[ \t　]*(#{1,4})[ \t　]*(?=[^\s#])/g,"$1\n\n$2 "); // 文末直後の見出しマーカーを独立行に（例:「…います。#ログイン手順」）
  s=s.replace(/(^|\n)(#{1,4})(?=[^\s#\n])/g,"$1$2 ");                            // 行頭#の直後に空白を補完
  s=s.replace(/(^|\n)(#{2,4})[ \t　]*\n[ \t　]*(?=\S)/g,"$1$2 ");  // 見出し記号だけが孤立(### 改行 本文)→同じ行に結合
  s=s.replace(/(^|\n)#{1,4}[ \t　]*(?=\n|$)/g,"$1");              // 中身のない見出し記号(###だけ)を除去
  s=s.replace(/[ \t　]*(#{2,4})[ \t]+/g,"\n\n$1 ");              // 見出しを独立行＋前空行
  s=s.replace(/(#{2,4} [^\n。]{1,40}?。)[ \t　]*(?=\S)/g,"$1\n"); // 見出しが長文を巻き込んだら最初の句点で改行
  s=s.replace(/([。．！？」』）)\]：:])[ \t　]*(-[ \t])/g,"$1\n$2"); // 句点/閉じ括弧の直後の「- 」(スペース無しでも)を改行
  s=s.replace(/([^\n])[ \t　]+(-[ \t])/g,"$1\n$2");              // 文中の「- 」箇条書きを改行
  s=s.replace(/(^|\n)[ \t　]*-[ \t]+/g,"$1・ ");                 // 箇条書き記号を「・」に統一
  s=s.replace(/(^|\n)[ \t　]*・[ \t]*((?:\*\*)?[^\n：:]{1,20}?(?:\*\*)?[：:])[ \t]*(?=\n|$)/g,"$1### $2"); // 「ラベル：」のみの箇条書きは小見出し化(配下の説明と区別)
  s=s.replace(/([^\n0-9])[ \t　]*(\d{1,2}\.[ \t])/g,"$1\n$2");   // 文中の「N. 」番号付きを改行
  s=s.replace(/[ \t　]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").replace(/^\n+/,"").trim();
  return s;
}
// 本文から要約（冒頭の結論）を抽出：最初の見出し/箇条書きでない段落の先頭1〜2文
function deriveLead(body){
  const lines=String(body||"").split(/\n/);
  for(let k=0;k<lines.length;k++){
    const t=lines[k].trim();
    if(!t || /^#{1,4}\s/.test(t) || /^[\*\-・･]\s?/.test(t) || /^\d+[\.\)]\s/.test(t) || /[?？]$/.test(t)) continue;
    const m=t.match(/^[\s\S]*?[。！？][\s\S]*?[。！？]/) || t.match(/^[\s\S]*?[。！？]/);
    return (m?m[0]:t).replace(/\s+/g,"").slice(0,180).trim();
  }
  return String(body||"").replace(/\s+/g," ").slice(0,120).trim();
}

// 元記事の画像を「直前の文」とのマッチングで生成本文の対応位置に挿入（元ナレッジと同じ順番・位置を保持）
function insertImagesByPosition(genBody, srcBody){
  try{
    const src=String(srcBody||""); const gen=String(genBody||"");
    const re=/!\[img\]\(([^)]+)\)/g; const items=[]; let m, last=0;
    while((m=re.exec(src))){
      const rawBefore=src.slice(last,m.index).replace(/!\[img\]\([^)]*\)/g,"");
      const flat=rawBefore.replace(/\s+/g," ").trim();
      // 表示用の文脈＝直前の「意味のある行」だけ（区切り線・目次的な断片は除外）
      const lns=rawBefore.split(/\n/).map(s=>s.trim().replace(/[‐\-—―─ー_=＝*＊]{3,}/g," ").replace(/\s+/g," ").trim()).filter(s=>s.replace(/[・･\s]/g,"").length>=2);
      let cx=lns.length?lns[lns.length-1]:"";
      if(cx.length<8 && lns.length>1) cx=lns[lns.length-2]+" "+cx;
      items.push({url:m[1], anchor:flat.slice(-70), ctx:cx.slice(-160)});
      last=re.lastIndex;
    }
    if(!items.length) return gen;
    const clean=s=>String(s||"").replace(/[\s　#*・\-0-9０-９.．「」『』（）()。、,，：:！!？?＞>※]/g,"");
    const lines=gen.split("\n"); let from=0; const missing=[];
    items.forEach(it=>{
      if(gen.indexOf(it.url)>=0) return;                       // LLMが既に本文中へ配置済み
      const a=clean(it.anchor); if(a.length<4){ missing.push(it); return; }
      const ag=[]; for(let i=0;i<a.length-1;i++) ag.push(a.substr(i,2));
      let bi=-1, bs=0;
      for(let i=from;i<lines.length;i++){
        const l=clean(lines[i]); if(l.length<4) continue;
        let s=0; for(let k=0;k<ag.length;k++){ if(l.indexOf(ag[k])>=0) s++; }
        const sc=s/Math.max(8,ag.length);   // アンカー（元記事の直前文）側の被覆率で採点＝短い行が有利にならない
        if(sc>bs){ bs=sc; bi=i; }
      }
      if(bi>=0 && bs>=0.2){ lines.splice(bi+1,0,"","![img]("+it.url+")",""); from=bi+2; }
      else missing.push(it);                                   // 対応位置が見つからない画像は末尾へ（元記事の直前テキスト付き）
    });
    let out=lines.join("\n").replace(/\n{3,}/g,"\n\n").trim();
    if(missing.length){
      // 画像を裸で連続させず、元ナレッジの直前の文を添えて「テキスト→画像」の元の順序で出力
      const tail=missing.map(x=>{
        let c=String(x.ctx||"").trim();
        if(c && clean(out).indexOf(clean(c).slice(0,24))>=0) c="";   // 生成本文に既にある文は重複させない
        return (c?c+"\n\n":"")+"![img]("+x.url+")";
      }).join("\n\n");
      out=(out?out+"\n\n":"")+tail;
    }
    return out;
  }catch(e){ return genBody; }
}

// 末尾の不完全な文を除去（見切れ防止）
function trimToSentence(t){
  t=String(t||"").trim(); if(!t) return t;
  if(/[。！？!?」』）)\]：:\-・>\n]$/.test(t)) return t;
  const m=t.match(/^[\s\S]*[。！？!?」』）)\]]/);
  return (m && m[0].length>=Math.floor(t.length*0.4)) ? m[0] : t;
}

// サポート文脈：他社プロダクトが明示されていない限り in-scope（あいさつ/メタ/雑談は手前で判定済み）
function isLineRelated(q){ return !FOREIGN.test(String(q||"").toLowerCase()); }
// 曖昧なトラブル（具体機能が無いエラー報告）→ 深掘りして関連候補を提示
function isVagueTrouble(q){
  const t=String(q||"");
  const trouble=/(エラー|えらー|不具合|動かない|うごかない|出来ない|できない|おかしい|表示されない|届かない|失敗|問題|困っ|バグ)/.test(t);
  const specific=/(シナリオ|リッチメニュー|セグメント|オーディエンス|配信|ステップ|ログイン|レポート|分析|ラベル|友だち|メッセージ|ユーザー|権限|予約|流入|一問一答|有人)/.test(t);
  return trouble && !specific && t.length<=16;
}
// 契約・手続き・セールス系 → フォーム提示
function isSales(q){ return /(解約|退会|契約|料金|価格|費用|見積|お見積|プラン変更|プランの変更|申込|申し込み|導入したい|購入|支払|請求|アップグレード|オプション追加|乗り換え|商談|営業)/.test(String(q||"")); }

// 入力のヒューリスティック分類（あいさつ/お礼/雑談/曖昧 は検索せず会話で返す）
function classifyInput(s){
  const t=String(s||"").trim().toLowerCase();
  if(/^(こんにち|こんばん|おはよ|やあ|はじめまして|hi$|hi |hello|hey|よろし|どうも$|お疲れ)/.test(t)) return "greeting";
  if(/(ありがとう|有難う|thank|助かりました|助かる|サンキュー)/.test(t)) return "thanks";
  // メタ質問（ボット自身/サービス自体への問い）→ DECAサービス内容として検索
  if(/(あなた|きみ|君|貴方|お前)(は|の|って|に)|得意|何ができ|なにができ|何者|誰です|機能は|どんな(こと|サービス|機能|ツール)|何のため|サービス(は|って|の概要|内容|について)|deca.*とは|libero.*とは|とは(何|なに|\?|？)/.test(t)) return "meta";
  if(t.length<3) return "vague";
  if(!/[ぁ-んァ-ヶー一-龠a-z0-9]/.test(t)) return "smalltalk";
  // DECA関連でも疑問形でもない、ごく短い雑談的入力
  if(t.length<6 && !/(配信|シナリオ|メニュー|ログイン|セグメント|ユーザー|権限|エラー|レポート|友だち|設定|方法|やり方|でき|どう|？|\?)/.test(t)) return "vague";
  return "question";
}

// タイプライター表示（回答が生成されていく過程を演出）
function Typewriter({text}){
  const [n,setN]=useState(0);
  useEffect(()=>{ setN(0); const s=String(text||""); if(!s) return; let i=0; const id=setInterval(()=>{ i+=2; setN(i); if(i>=s.length) clearInterval(id); }, 16); return ()=>clearInterval(id); },[text]);
  return React.createElement(Markdown,{text:String(text||"").slice(0,n)});
}

  // 右ペインに大きく出す「最新の回答（FAQ記事）」
  // 過去に見たFAQ一覧（上部タブ）。表示中＝アクティブタブ or 最新
  const artList=[]; for(let k=0;k<msgs.length;k++){ if(msgs[k].from==='bot' && msgs[k].art && closedTabs.indexOf(msgs[k].id)<0) artList.push({id:msgs[k].id, art:msgs[k].art}); }
  let latestArt=null, latestMsgId=null;
  if(activeArt){ const f=artList.find(a=>a.id===activeArt); if(f){ latestArt=f.art; latestMsgId=f.id; } }
  if(!latestArt && artList.length){ const last=artList[artList.length-1]; latestArt=last.art; latestMsgId=last.id; }
  const live = !activeArt;   // 最新(生成中)表示時のみタイプライター。過去タブ閲覧時は即表示

  return (
    <React.Fragment>
      {expanded && <div className="backdrop" onClick={()=>setExpanded(false)}></div>}
      <div className={"panel"+(expanded?" expanded":"")}>
        <div className="pHd">
          <div className="av logo"><Logo/></div>
          <div style={{flex:1}}><div className="t">DECA サポートコンシェルジュ</div></div>
          {expanded
            ? <button className="exp" onClick={()=>setExpanded(false)}>⤡ 縮小</button>
            : (latestArt && <button className="exp" onClick={()=>setExpanded(true)}>⤢ 拡大</button>)}
          <button className="x" onClick={reload} title="会話をリセット">↻</button>
          <button className="x" onClick={()=>setOpen(false)}>×</button>
        </div>
        <div className="bodyRow">
          <div className="leftcol">
            <div className="thread" ref={threadRef}>
              <div className="day">今日</div>
              {msgs.map(m=> m.from==='me'
                ? <div className="row me" key={m.id}><div className="av"><UserIcon/></div><div className="bub">{m.text}</div></div>
                : <React.Fragment key={m.id}>
                    {m.text && <div className="row bot"><div className="av logo"><Logo/></div><div className="bub">{mdInline(m.text)}</div></div>}
                    {m.starters &&
                      <React.Fragment>
                        <div className="chips"><span className="lbl">よくあるご質問</span>
                          {m.starters.map((s,i)=><button className="chip" key={i} onClick={()=>askTopic(s)}>{s}</button>)}
                        </div>
                        {m.others &&
                          <div className="chips"><span className="lbl">その他</span>
                            {m.others.map((s,i)=><button className="chip" key={i} onClick={()=>handleOther(s)}>{s}</button>)}
                          </div>}
                      </React.Fragment>}
                    {m.related && m.related.length>0 &&
                      <div className="chips"><span className="lbl">{m.choices ? "選択肢" : "関連する質問"}</span>
                        {m.related.map((s,i)=><button className="chip" key={i} onClick={()=>askTopic(s)}>{s}</button>)}
                      </div>}
                    {m.choices && m.choices.length>0 &&
                      <div className="chips"><span className="lbl">選択、または下の入力欄に自由入力できます</span>
                        {m.choices.map((c,i)=><button className="chip" key={i} onClick={()=>send(c.title)}>{c.title}</button>)}
                      </div>}
                  </React.Fragment>
              )}
              {typing && <div className="row bot typing"><div className="av logo"><Logo/></div><div className="bub"><i></i><i></i><i></i></div></div>}
              {loading && <div className="row bot"><div className="av logo"><Logo/></div><div className="bub load"><span className="spin"></span>{String(loading).replace(/（(約|\d)/,'\n（$1')}<span className="elapsed">　経過 {elapsed}秒</span></div></div>}
            </div>
            {err && <div className="err">接続エラー: {err}</div>}
            <form className="composer" onSubmit={e=>{e.preventDefault();send(input);}}>
              <textarea rows="1" value={input} placeholder={busy?"応答中です…少々お待ちください":"メッセージを入力（Shift + Enter で送信）"}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&e.shiftKey){e.preventDefault();if(!busy)send(input);}}}/>
              <button className="snd" type="submit" disabled={!input.trim()||busy}>↑</button>
            </form>
          </div>
          <div className="answerPane">
            {artList.length>1 &&
              <div className="faqTabs">
                {artList.map(a=>
                  <div key={a.id} className={"faqTab"+(a.id===latestMsgId?" act":"")} title={a.art.title}>
                    <span className="faqTabName" onClick={()=>setActiveArt(a.id)}>{a.art.title}</span>
                    <span className="faqTabX" onClick={(e)=>{e.stopPropagation(); closeTab(a.id);}} title="このタブを閉じる">×</span>
                  </div>)}
              </div>}
            <div className="faqBody">
              {latestArt
                ? <div className="article">
                    <h2>{latestArt.title}</h2>
                    <div className="meta"><span className="pill">DECA for LINE</span><span>よくあるご質問（FAQ）・公式ヘルプセンター</span></div>
                    {latestArt.lead && <div className="lead"><span className="leadlbl">💡 回答</span><div className="leadtx">{live ? <Typewriter text={latestArt.lead}/> : <Markdown text={latestArt.lead}/>}</div></div>}
                    {latestArt._detailLoading
                      ? <React.Fragment><div className="detlbl">詳細</div><div className="detloading"><span className="dspin"></span>詳細を作成しています…（約10秒）<span className="elapsed">　経過 {detElapsed}秒</span></div></React.Fragment>
                      : (latestArt.body && latestArt.body!==latestArt.lead && <React.Fragment><div className="detlbl">詳細</div>{live ? <Typewriter text={latestArt.body}/> : <Markdown text={latestArt.body}/>}</React.Fragment>)}
                    {latestArt.sources && latestArt.sources.length>0 &&
                      <div className="srcbox">
                        <div className="srchd">📚 この回答に利用した情報（関連度）</div>
                        {latestArt.sources.map((s,i)=>
                          <div className="srcrow" key={i}>
                            <div className="srctitle">{s.url ? <a href={s.url} target="_blank" rel="noopener">{s.title}</a> : <span>{s.title}</span>} ↗</div>
                            {typeof s.pct==='number' &&
                              <div className="srcrel"><div className="srcbar"><div className="srcfill" style={{width:s.pct+'%'}}></div></div><span className="srcpct">{s.pct}%</span></div>}
                          </div>)}
                      </div>}
                    <div className="fb">
                      <span className="fbq">この回答は役に立ちましたか？</span>
                      {fbState[latestMsgId]
                        ? <span className="fbthx">✓ フィードバックを記録しました（{fbState[latestMsgId]}）</span>
                        : <React.Fragment>
                            <button className="fbtn up" onClick={()=>handleFeedback(latestMsgId,'参考になった')}>👍 参考になった</button>
                            <button className="fbtn down" onClick={()=>handleFeedback(latestMsgId,'参考にならなかった')}>👎 ならなかった</button>
                          </React.Fragment>}
                    </div>
                  </div>
                : <div className="faqEmpty"><span className="big">📄</span>FAQの回答が見つかると、<br/>ここに分かりやすく表示されます。</div>}
            </div>
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("aw-root")).render(<App/>);
</script>
</body>
</html>
